<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/game.css">
    <title>身份校验</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 md:p-10 shadow-2xl rounded-xl w-full max-w-[450px] border border-gray-200">
        <div class="bg-blue-600 text-white p-6 -mx-6 md:-mx-10 -mt-6 md:-mt-10 rounded-t-xl mb-8">
            <p class="text-sm opacity-90">请选出图中所有的</p>
            <h2 class="text-2xl font-bold"> GAY </h2>
        </div>
        
        <div class="grid grid-cols-3 gap-1 md:gap-2 mb-8">
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/01.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/02.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/03.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/04.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box selected aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/csb.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/05.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/06.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/07.jpg" class="w-full h-full object-cover">
            </div>
            <div class="captcha-box aspect-square bg-gray-200 cursor-pointer overflow-hidden" onclick="toggleSelect(this)">
                <img src="../assets/images/08.jpg" class="w-full h-full object-cover">
            </div>
        </div>

        <button onclick="verify()" class="w-full bg-blue-600 text-white py-4 text-lg font-bold rounded-lg shadow-lg">
            立即验证
        </button>
    </div>

    <script>
        function toggleSelect(element) {
            element.classList.toggle('selected');
        }
        function verify() {
            Swal.fire({
                title: '验证失败！',
                text: '疑似奶龙，需前往大调查。',
                icon: 'error',
                confirmButtonText: '我才是奶龙',
                confirmButtonColor: '#2563eb'
            }).then(() => {
                window.location.href = 'step3-museum.html';
            });
        }
    </script>
</body>
</html>
